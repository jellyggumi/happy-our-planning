# 테마 통제 어휘 + 소스 카테고리 → 표준 테마 매핑
themes:
  - 공연        # 콘서트/연극/뮤지컬/클래식
  - 전시        # 미술/박물관/특별전
  - 축제        # 지역축제/문화제
  - 교육        # 강좌/워크숍/세미나
  - 체험        # 체험/투어/원데이
  - 공모전      # 공모/대회/콘테스트
  - 채용·취업   # 채용박람회/일자리
  - 복지·지원   # 정부/지자체 지원·모집
  - 스포츠      # 대회/생활체육
  - 봉사        # 자원봉사

# 소스 카테고리 코드/문자열 → 표준 테마
mapping:
  kopis:
    "AAAA": "공연"   # 연극
    "GGGA": "공연"   # 뮤지컬
    "CCCA": "공연"   # 클래식
    "EEEA": "공연"   # 무용
    "BBBC": "전시"   # 전시
  tourapi:
    "A02070100": "축제"  # 문화관광축제
    "A02070200": "축제"  # 일반축제
  datagokr:
    "공연/전시": "전시"
    "교육/체험": "교육"
    "행사/축제": "축제"
